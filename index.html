<script>
const DATA=JSON.parse(document.getElementById('payload').textContent);const qs=[['favorite','最喜歡我們什麼地方？','顧客最常肯定的是產品帶來的日常改善與使用便利性，這些是品牌溝通最值得放大的證據。'],['dislike','最討厭我們什麼地方？','主要阻力集中在價格、體感不明顯與使用細節，代表成交後仍需要更清楚的期待管理與陪伴。'],['change','如果您是創辦人，您會做什麼改變？','顧客提出的改善方向多半不是推翻產品，而是降低嘗試門檻、優化包裝與讓補貨更順。'],['pain','解決了最大的痛點或問題是什麼？','被解決的問題多與長時間用眼、睡眠壓力、運動恢復與家庭保養有關，是產品內容與會員經營的核心場景。']];let selected=new Set();const from=document.getElementById('fromMonth'),to=document.getElementById('toMonth'),chips=document.getElementById('productChips');function opt(sel,val){const o=document.createElement('option');o.value=val;o.textContent=val.replace('-', '/');sel.appendChild(o)}DATA.months.forEach(m=>{opt(from,m);opt(to,m)});from.value=DATA.months[0];to.value=DATA.months[DATA.months.length-1];DATA.products.forEach((p,i)=>{const b=document.createElement('button');b.className='chip';b.textContent=p;b.onclick=()=>{selected.has(i)?selected.delete(i):selected.add(i);render()};chips.appendChild(b)});document.getElementById('selectAll').onclick=()=>{selected=new Set(DATA.products.map((_,i)=>i));render()};document.getElementById('clearProducts').onclick=()=>{selected.clear();render()};document.getElementById('resetAll').onclick=()=>{from.value=DATA.months[0];to.value=DATA.months[DATA.months.length-1];selected.clear();render()};from.onchange=()=>{if(from.value>to.value)to.value=from.value;render()};to.onchange=()=>{if(to.value<from.value)from.value=to.value;render()};function bitCount(n){let c=0;while(n){n&=n-1;c++}return c}function activeRecords(){const a=DATA.months.indexOf(from.value),b=DATA.months.indexOf(to.value);return DATA.records.filter(r=>r[0]>=a&&r[0]<=b&&(selected.size===0||[...selected].some(i=>r[1]&(1<<i))))}function counts(rows,idx,len){const c=Array(len).fill(0);rows.forEach(r=>{for(let i=0;i<len;i++)if(r[idx]&(1<<i))c[i]++});return c}function drawBars(labels,counts){const max=Math.max(1,...counts);return labels.map((l,i)=>'<div class="bar"><div class="bar-name">'+l+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(counts[i]/max*100)+'%"></div></div><div class="bar-count">'+counts[i]+'</div></div>').join('')}function render(){[...chips.children].forEach((b,i)=>b.classList.toggle('active',selected.has(i)));const rows=activeRecords();let prodHits=DATA.products.map((p,i)=>rows.filter(r=>r[1]&(1<<i)).length).filter(Boolean).length;document.getElementById('summary').innerHTML='<div class="metric"><b>'+rows.length+'</b><span>納入洞察樣本</span></div><div class="metric"><b>'+from.value.replace('-', '/')+' - '+to.value.replace('-', '/')+'</b><span>目前年月區間</span></div><div class="metric"><b>'+(selected.size||'全部')+'</b><span>產品篩選</span></div><div class="metric"><b>'+prodHits+'</b><span>區間內有回饋產品</span></div>';if(!rows.length){document.getElementById('cards').innerHTML='<div class="empty">這個篩選條件下沒有可呈現的洞察，請放寬年月或產品條件。</div>';return}document.getElementById('cards').innerHTML=qs.map(([key,title,lead],n)=>{const idx={favorite:2,dislike:3,change:4,pain:5}[key];const c=counts(rows,idx,DATA.labels[key].length);return '<article class="card '+(key==='pain'?'wide':'')+'"><h2>'+title+'</h2><p class="lead">'+lead+'</p>'+drawBars(DATA.labels[key],c)+'</article>'}).join('')}
